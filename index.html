<!DOCTYPE html>
<html>
  <head>
    <title>Juliet Chevelle Ranch Generator</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        background: linear-gradient(135deg, #f7d6e0, #f3e5c8, #c48a45);
      }

      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
        width: 90%;
        max-width: 1100px;
      }

      .side {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 220px;
      }

      .card {
        background: #fffaf5;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
        border: 4px solid #8b5a2b;
        box-shadow: 0 20px 50px rgba(60, 30, 10, 0.35);
        width: 420px;
      }

      h1 {
        color: #7a3e2d;
        margin-bottom: 10px;
      }

      p {
        color: #a47148;
        font-size: 16px;
      }

      .box {
        padding: 15px;
        border-radius: 15px;
        background: #fff0f5;
        border: 2px dashed #c48a45;
        font-size: 16px;
        color: #4a2814;
        min-height: 60px;
      }

      #mainBox {
        margin-top: 20px;
        padding: 25px;
        border-radius: 20px;
        background: #fff0f5;
        border: 2px dashed #c48a45;
        font-size: 22px;
        min-height: 140px;
        white-space: pre-line;
      }

      button {
        background: linear-gradient(145deg, #d291bc, #a0522d);
        color: #fffaf5;
        border: 2px solid #7b4a2f;
        padding: 12px;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 5px 0 #7b4a2f;
      }

      button:hover {
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(2px);
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- LEFT SIDE -->
      <div class="side">
        <button onclick="generateNickname()">🤍 Cutesy Nickname</button>
        <div id="nicknameBox" class="box">Nickname appears here</div>

        <button onclick="generateAmazingThing()">🌸 Amazing Thing</button>
        <div id="amazingBox" class="box">Amazing thing appears here</div>
      </div>

      <!-- CENTER -->
      <div class="card">
        <h1>Juliet Chevelle</h1>
        <p>soft ranch poetry for a one of a kind girl</p>

        <div id="mainBox">
Click something to begin 🤍
        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="side">
        <button onclick="generateHaiku()">🐎 Haiku</button>
        <button onclick="generateCutesyThing()">🎀 Cutesy Thing</button>
        <button onclick="generateFunnyPoem()">🤠 Funny Poem</button>
      </div>

    </div>

    <script>
      let currentNickname = "";
      let currentAmazingThing = "";

      function generateNickname() {
        const nicknames = [
          "Sweet Prairie Pearl",
          "Little Wildflower",
          "Honey Boots",
          "Cowgirl Sunshine",
          "Miss Golden Spurs",
          "Daisy Belle",
          "Sugar Saddle",
          "Bluebonnet Babe",
          "Tiny Trail Angel",
          "Juliet Rose of the Ranch",
          "Squishy",
          "Wildflower",
          "Princess"
        ];

        const i = Math.floor(Math.random() * nicknames.length);
        currentNickname = nicknames[i];

        document.getElementById("nicknameBox").innerText = currentNickname;
      }

      function generateAmazingThing() {
        const amazingThings = [
          "she is an amazing cook",
          "she is an intentional friend",
          "she is smokin hot",
          "she is a deep thinker",
          "she is a deep lover",
          "she is compassionate",
          "she is a great dance partner",
          "she is a great companion",
          "she is hilarious"
        ];

        const i = Math.floor(Math.random() * amazingThings.length);
        currentAmazingThing = amazingThings[i];

        document.getElementById("amazingBox").innerText = currentAmazingThing;
      }

      function generateHaiku() {
        if (!currentNickname) generateNickname();
        if (!currentAmazingThing) generateAmazingThing();

        const haiku =
          currentNickname + "\n" +
          "soft light on open plains\n" +
          currentAmazingThing;

        document.getElementById("mainBox").innerText = haiku;
      }

      function generateCutesyThing() {
        if (!currentNickname) generateNickname();
        if (!currentAmazingThing) generateAmazingThing();

        document.getElementById("mainBox").innerText =
          currentNickname + " is " + currentAmazingThing + " 🤍";
      }

      function generateFunnyPoem() {
        if (!currentNickname) generateNickname();
        if (!currentAmazingThing) generateAmazingThing();

        const poem =
          currentNickname + "\n" +
          "lost a boot but kept her crown\n" +
          currentAmazingThing + "\n" +
          "and somehow runs the whole town";

        document.getElementById("mainBox").innerText = poem;
      }
    </script>
  </body>
</html>
