<!DOCTYPE html>
<html>
  <head>
    <title>Juliet Chevelle Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, serif;
        background:
          linear-gradient(rgba(255, 245, 235, 0.55), rgba(255, 245, 235, 0.55)),
          url("https://images.unsplash.com/photo-1490750967868-88aa4486c946");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        color: #4a2814;
      }

      .phone {
        width: 390px;
        max-width: 100%;
        min-height: 760px;
        background: #fffaf5;
        border: 10px solid #3a2418;
        border-radius: 48px;
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
        overflow: hidden;
        position: relative;
      }

      .notch {
        width: 120px;
        height: 26px;
        background: #3a2418;
        border-radius: 0 0 18px 18px;
        margin: 0 auto;
      }

      .screen {
        padding: 24px;
        text-align: center;
      }

      .emoji {
        font-size: 34px;
        margin-top: 8px;
      }

      h1 {
        margin: 8px 0 6px;
        color: #7a3e2d;
        font-size: 30px;
      }

      .subtitle {
        margin: 0 0 20px;
        color: #9b6337;
        font-size: 14px;
        line-height: 1.5;
      }

      .section {
        background: rgba(255, 240, 245, 0.85);
        border: 2px dashed #c48a45;
        border-radius: 24px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #9b6337;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .box {
        background: #fffaf5;
        border-radius: 18px;
        padding: 16px;
        min-height: 64px;
        font-size: 18px;
        line-height: 1.5;
        display: flex;
        align-items: center;
        justify-content: center;
        white-space: pre-line;
        color: #4a2814;
        box-shadow: inset 0 0 16px rgba(196, 138, 69, 0.14);
      }

      .haiku-box {
        min-height: 170px;
        font-size: 20px;
        line-height: 1.7;
      }

      button {
        width: 100%;
        background: linear-gradient(145deg, #d99abf, #a45a2a);
        color: white;
        border: 2px solid #7b4a2f;
        padding: 14px 18px;
        border-radius: 999px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        box-shadow: 0 5px 0 #7b4a2f;
        margin-top: 12px;
      }

      button:active {
        transform: translateY(3px);
        box-shadow: 0 2px 0 #7b4a2f;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 10px;
      }

      .home-bar {
        width: 120px;
        height: 5px;
        background: #3a2418;
        border-radius: 999px;
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
      }

      @media (max-width: 430px) {
        body {
          padding: 12px;
          align-items: flex-start;
        }

        .phone {
          border-width: 8px;
          border-radius: 40px;
          min-height: 720px;
        }

        .screen {
          padding: 20px;
        }

        h1 {
          font-size: 27px;
        }

        .haiku-box {
          min-height: 155px;
          font-size: 19px;
        }
      }
    </style>
  </head>

  <body>
    <div class="phone">
      <div class="notch"></div>

      <div class="screen">
        <div class="emoji">🌸🤠🌾</div>
        <h1>Juliet Chevelle</h1>
        <p class="subtitle">a soft poem for a one of a kind girl</p>

        <div class="section">
          <div class="label">Nickname</div>
          <div id="nicknameBox" class="box">tap to generate a nickname</div>
          <button onclick="generateNickname()">Generate Nickname</button>
        </div>

        <div class="section">
          <div class="label">Amazing Thing</div>
          <div id="amazingBox" class="box">tap to generate something amazing</div>
          <button onclick="generateAmazingThing()">Generate Amazing Thing</button>
        </div>

        <div class="section">
          <div class="label">Haiku</div>
          <div id="haikuBox" class="box haiku-box">tap to generate a haiku</div>
          <button onclick="generateHaiku()">Generate Haiku</button>
        </div>
      </div>

      <div class="home-bar"></div>
    </div>

    <script>
      let currentNickname = "";
      let currentAmazingThing = "";

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function generateNickname() {
        const softWords = [
          "Golden", "Velvet", "Wild", "Honey", "Rose", "Moonlit", "Prairie",
          "Daisy", "Bluebonnet", "Sugar", "Starlit", "Sunset", "Pearl",
          "Dreamy", "Sweet", "Brave", "Radiant", "Gentle", "Darling"
        ];

        const ranchWords = [
          "Cowgirl", "Wildflower", "Boots", "Belle", "Angel", "Princess",
          "Rider", "Rose", "Darlin", "Meadow", "Dove", "Heart", "Muse",
          "Trail Queen", "Prairie Pearl", "Sunshine", "Squishy", "Princess"
        ];

        currentNickname = pick(softWords) + " " + pick(ranchWords);
        document.getElementById("nicknameBox").innerText = currentNickname;
      }

      function generateAmazingThing() {
        const openings = [
          "loyal in ways that feel rare",
          "intelligent with a beautifully curious mind",
          "funny in a way that makes moments unforgettable",
          "talented without needing attention",
          "wise beyond the obvious answer",
          "smokin' hot with effortless confidence",
          "adventurous with an open heart",
          "family oriented in the sweetest way",
          "an amazing friend who truly shows up",
          "a princess with strength beneath softness"
        ];

        const endings = [
          "and she makes people feel known",
          "while carrying beauty with humility",
          "and she brings light into every room",
          "with a spirit that refuses to be ordinary",
          "and her presence feels like peace",
          "while still being completely hilarious",
          "and she turns simple moments into memories",
          "with a heart that gives freely",
          "and she holds both softness and strength",
          "while making life feel more alive"
        ];

        currentAmazingThing = pick(openings) + ", " + pick(endings);
        document.getElementById("amazingBox").innerText = currentAmazingThing;
      }

      function generateHaiku() {
        if (!currentNickname) generateNickname();
        if (!currentAmazingThing) generateAmazingThing();

        const lineTwo = [
          "wisdom blooms in dust",
          "truth walks through open fields",
          "grace thinks before it speaks",
          "stars study her silence",
          "beauty asks deeper things",
          "wonder bends toward her",
          "soft strength names the dawn",
          "light gathers in her"
        ];

        const lineThree = [
          "she is " + currentAmazingThing,
          "love made visible",
          "depth wrapped in laughter",
          "a soul built to bloom",
          "truth wearing softness",
          "joy with deep roots",
          "wonder made human"
        ];

        const haiku =
          currentNickname + "\n" +
          pick(lineTwo) + "\n" +
          pick(lineThree);

        document.getElementById("haikuBox").innerText = haiku;
      }
    </script>
  </body>
</html>
