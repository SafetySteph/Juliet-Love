<!DOCTYPE html>
<html>
  <head>
    <title>Princess Juliet </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, serif;
        background: linear-gradient(135deg, #f7d6e0, #f6e7c8, #c98b52);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        color: #4a2814;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: 1fr 1.4fr 1fr;
        gap: 24px;
        align-items: center;
      }

      .panel {
        background: rgba(255, 250, 245, 0.95);
        border: 3px solid #9b6337;
        border-radius: 28px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 18px 45px rgba(70, 35, 15, 0.28);
      }

      h1 {
        margin: 0 0 8px;
        color: #7a3e2d;
        font-size: 32px;
      }

      h2 {
        margin: 0 0 14px;
        color: #7a3e2d;
        font-size: 22px;
      }

      p {
        margin: 0 0 20px;
        color: #9b6337;
        font-size: 15px;
      }

      button {
        background: linear-gradient(145deg, #d99abf, #a45a2a);
        color: white;
        border: 2px solid #7b4a2f;
        padding: 14px 18px;
        border-radius: 999px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        box-shadow: 0 5px 0 #7b4a2f;
        margin-bottom: 18px;
      }

      button:active {
        transform: translateY(3px);
        box-shadow: 0 2px 0 #7b4a2f;
      }

      .box {
        background: #fff0f5;
        border: 2px dashed #c48a45;
        border-radius: 20px;
        padding: 20px;
        min-height: 100px;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        white-space: pre-line;
        line-height: 1.6;
      }

      .middle .box {
        min-height: 190px;
        font-size: 24px;
        background: linear-gradient(180deg, #fffaf5, #fff0f5);
      }

      .emoji {
        font-size: 30px;
        margin-bottom: 10px;
      }

      @media (max-width: 850px) {
        .container {
          grid-template-columns: 1fr;
        }

        .middle {
          order: -1;
        }

        h1 {
          font-size: 28px;
        }

        .middle .box {
          font-size: 21px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">

      <div class="panel">
        <div class="emoji">🤍🌸</div>
        <h2>Nickname</h2>
        <button onclick="generateNickname()">Generate Nickname</button>
        <div id="nicknameBox" class="box">nickname appears here</div>
      </div>

      <div class="panel middle">
        <div class="emoji">🌾🐎🌸</div>
        <h1>Juliet Chevelle</h1>
        <p>A soft ranch haiku generator</p>
        <button onclick="generateHaiku()">Generate Haiku</button>
        <div id="haikuBox" class="box">haiku appears here</div>
      </div>

      <div class="panel">
        <div class="emoji">✨🤠</div>
        <h2>Amazing Thing</h2>
        <button onclick="generateAmazingThing()">Generate Amazing Thing</button>
        <div id="amazingBox" class="box">amazing thing appears here</div>
      </div>

    </div>

    <script>
      let currentNickname = "";
      let currentAmazingThing = "";

      function generateNickname() {
        const nicknames = [
          "Squishy",
          "Wildflower",
          "Princess",
          "Honey Boots",
          "Daisy Belle",
          "Cowgirl Sunshine",
          "Sweet Prairie Pearl",
          "Bluebonnet Babe",
          "Juliet Rose",
          "Little Wildflower",
          "Sugar Saddle",
          "Miss Golden Spurs"
        ];

        currentNickname = nicknames[Math.floor(Math.random() * nicknames.length)];
        document.getElementById("nicknameBox").innerText = currentNickname;
      }

      function generateAmazingThing() {
        const amazingThings = [
          "an amazing cook",
          "an intentional friend",
          "smokin hot",
          "a deep thinker",
          "a deep lover",
          "compassionate",
          "a great dance partner",
          "a great companion",
          "hilarious",
          "kind hearted",
          "full of grace",
          "soft but strong"
        ];

        currentAmazingThing = amazingThings[Math.floor(Math.random() * amazingThings.length)];
        document.getElementById("amazingBox").innerText = currentAmazingThing;
      }

      function generateHaiku() {
        if (currentNickname === "") {
          generateNickname();
        }

        if (currentAmazingThing === "") {
          generateAmazingThing();
        }

        const haikuLines = [
          currentNickname + "\n" +
          "soft light fills the plains\n" +
          "she is " + currentAmazingThing,

          currentNickname + "\n" +
          "wildflowers bend toward her\n" +
          "she is " + currentAmazingThing,

          currentNickname + "\n" +
          "gold dust rides the wind\n" +
          "she is " + currentAmazingThing,

          currentNickname + "\n" +
          "moonlight on the ranch\n" +
          "she is " + currentAmazingThing,

          currentNickname + "\n" +
          "boots move through soft grass\n" +
          "she is " + currentAmazingThing,

          currentNickname + "\n" +
          "sunset wraps the sky\n" +
          "she is " + currentAmazingThing,

          currentNickname + "\n" +
          "laughter fills the barn\n" +
          "she is " + currentAmazingThing,

          currentNickname + "\n" +
          "rose petals drift slow\n" +
          "she is " + currentAmazingThing
        ];

        const randomIndex = Math.floor(Math.random() * haikuLines.length);
        document.getElementById("haikuBox").innerText = haikuLines[randomIndex];
      }
    </script>
  </body>
</html>
