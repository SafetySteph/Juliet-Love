<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>For Juliet</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: #3f2f24;
      background:
        linear-gradient(rgba(255, 248, 238, 0.76), rgba(255, 248, 238, 0.76)),
        url("https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .phone-frame {
      width: 100%;
      max-width: 430px;
      min-height: 880px;
      background: rgba(255, 250, 240, 0.92);
      border: 8px solid #3f2f24;
      border-radius: 42px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(6px);
    }

    .top-bar {
      width: 120px;
      height: 6px;
      border-radius: 20px;
      background: #3f2f24;
      margin: 18px auto 0;
      opacity: 0.8;
    }

    header {
      text-align: center;
      padding: 22px 22px 8px;
    }

    h1 {
      margin: 0;
      font-size: 2.35rem;
      color: #6f4e37;
      letter-spacing: 1px;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #70594a;
    }

    .wildflower-divider {
      text-align: center;
      font-size: 1.35rem;
      margin: 8px 0 14px;
    }

    .section-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0 18px 95px;
    }

    .generator-box {
      border-radius: 26px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.76);
      border: 2px solid rgba(168, 111, 76, 0.24);
      box-shadow: 0 8px 20px rgba(63, 47, 36, 0.12);
      text-align: center;
    }

    .generator-box h2 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      color: #6f4e37;
    }

    button {
      border: none;
      border-radius: 22px;
      padding: 12px 16px;
      width: 100%;
      font-family: inherit;
      font-size: 0.98rem;
      font-weight: bold;
      color: #fffaf0;
      background: linear-gradient(135deg, #a86f4c, #6f8f72);
      box-shadow: 0 7px 16px rgba(63, 47, 36, 0.2);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(63, 47, 36, 0.28);
    }

    button:active {
      transform: scale(0.98);
    }

    .mini-output {
      margin-top: 12px;
      min-height: 70px;
      border-radius: 20px;
      padding: 14px;
      background: rgba(255, 248, 238, 0.9);
      border: 1px solid rgba(111, 78, 55, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.55;
      font-size: 0.98rem;
      color: #3f2f24;
      white-space: pre-line;
    }

    .scripture-output {
      min-height: 110px;
      font-size: 0.94rem;
    }

    .flowers {
      position: absolute;
      inset: auto 0 0 0;
      height: 82px;
      pointer-events: none;
      opacity: 0.88;
      background: linear-gradient(transparent, rgba(255, 246, 230, 0.98));
      display: flex;
      justify-content: center;
      align-items: end;
      font-size: 1.85rem;
      padding-bottom: 12px;
    }
  </style>
</head>

<body>

    <div class="top-bar"></div>

    <header>
      <h1>For Juliet</h1>
      <p class="subtitle">
        A little wildflower corner of the internet made just for her.
      </p>
    </header>

    <div class="wildflower-divider">🌼 🌿 🌸 🌾 🌻</div>

        <button onclick="generateNickname()">Generate a cute nickname</button>
        <div class="mini-output" id="nicknameOutput">

        </div>
      </div>

      <div class="generator-box">
        <h2>Something Amazing</h2>
        <button onclick="generateAmazingThing()">Generate something amazing</button>
        <div class="mini-output" id="amazingOutput">

        </div>
      </div>

      <div class="generator-box">
        <h2>Haiku</h2>
        <button onclick="generateHaiku()">Generate a haiku</button>
        <div class="mini-output" id="haikuOutput">
          Tap for a tiny poem.
        </div>
      </div>

      <div class="generator-box">
        <h2>Scripture</h2>
        <button onclick="generateScripture()">Generate a scripture</button>
        <div class="mini-output scripture-output" id="scriptureOutput">
          Tap for a scripture.
        </div>
      </div>
    </section>

    <div class="flowers">🌷 🌼 🌻 🌸 🌿 🌺 🌾</div>
  </main>
