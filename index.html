<!DOCTYPE html>
<html>
  <head>
    <title>Juliet Chevelle Ranch Generator</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        background: linear-gradient(135deg, #f7d6e0, #f3e5c8, #c48a45);
      }

      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 90%;
        max-width: 1000px;
        gap: 40px;
      }

      .side-buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .card {
        background: #fffaf5;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
        border: 4px solid #8b5a2b;
        box-shadow: 0 20px 50px rgba(60, 30, 10, 0.35);
        width: 420px;
      }

      h1 {
        color: #7a3e2d;
        font-size: 34px;
        margin-bottom: 10px;
      }

      p {
        color: #a47148;
        font-size: 16px;
      }

      #haikuBox {
        margin-top: 25px;
        padding: 25px;
        border-radius: 20px;
        background: #fff0f5;
        border: 2px dashed #c48a45;
        font-size: 22px;
        color: #4a2814;
        min-height: 120px;
        white-space: pre-line;
      }

      button {
        background: linear-gradient(145deg, #d291bc, #a0522d);
        color: #fffaf5;
        border: 2px solid #7b4a2f;
        padding: 14px 18px;
        border-radius: 25px;
        font-size: 15px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 6px 0 #7b4a2f;
        transition: 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
        background: linear-gradient(145deg, #e8a2c6, #8b4513);
      }

      button:active {
        transform: translateY(2px);
        box-shadow: 0 3px 0 #7b4a2f;
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- LEFT -->
      <div class="side-buttons">
        <button onclick="generateNickname()">🤍 Cutesy Nickname</button>
      </div>

      <!-- CENTER -->
      <div class="card">
        <h1>Juliet Chevelle</h1>
        <p>soft ranch poetry for a one of a kind girl</p>

        <div id="haikuBox">
Click a button to begin 🤍
        </div>
      </div>

      <!-- RIGHT -->
      <div class="side-buttons">
        <button onclick="generateAmazingThing()">🌸 Amazing Thing</button>
        <button onclick="generateHaiku()">🐎 Create Haiku</button>
      </div>

    </div>

    <script>
      let currentNickname = "";
      let currentAmazingThing = "";

      function generateNickname() {
        const nicknames = [
          "Sweet Prairie Pearl",
          "Little Wildflower",
          "Honey Boots",
          "Cowgirl Sunshine",
          "Miss Golden Spurs",
          "Daisy Belle",
          "Sugar Saddle",
          "Bluebonnet Babe",
          "Tiny Trail Angel",
          "Juliet Rose of the Ranch"
        ];

        const randomIndex = Math.floor(Math.random() * nicknames.length);
        currentNickname = nicknames[randomIndex];

        document.getElementById("haikuBox").innerText =
          "Nickname:\n" + currentNickname;
      }

      function generateAmazingThing() {
        const amazingThings = [
          "she carries kindness like sunshine across an open field",
          "she has a heart that makes people feel safe and loved",
          "she brings joy into a room without even trying",
          "she is strong, gentle, and beautifully one of a kind",
          "she has a light that feels warm, steady, and true",
          "she makes ordinary moments feel sweet and memorable",
          "she is thoughtful, lovely, and full of grace",
          "she has a spirit as bright as a western sunset",
          "she is the kind of person people feel lucky to know",
          "she carries beauty, strength, and sweetness all at once",

          "she is an amazing cook who brings people together",
          "she is an intentional friend who truly shows up",
          "she is absolutely smokin hot and effortlessly radiant",
          "she is a deep thinker who sees beyond the surface",
          "she is a deep lover who gives with her whole heart",
          "she is compassionate and full of genuine care",
          "she is a great dance partner who brings joy to movement",
          "she is a great companion who makes life feel fuller",
          "she is hilarious and makes everything feel lighter"
        ];

        const randomIndex = Math.floor(Math.random() * amazingThings.length);
        currentAmazingThing = amazingThings[randomIndex];

        document.getElementById("haikuBox").innerText =
          "About her:\n" + currentAmazingThing;
      }

      function generateHaiku() {
        if (currentNickname === "") generateNickname();
        if (currentAmazingThing === "") generateAmazingThing();

        const haiku =
          currentNickname + "\n" +
          "soft light across the plains\n" +
          currentAmazingThing;

        document.getElementById("haikuBox").innerText = haiku;
      }
    </script>
  </body>
</html>
