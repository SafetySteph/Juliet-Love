<!DOCTYPE html>
<html>
  <head>
    <title>Princess Juliet </title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        background: linear-gradient(135deg, #f7d6e0, #f3e5c8, #c48a45);
      }

      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }

      .side {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 220px;
      }

      .card {
        background: #fffaf5;
        padding: 35px;
        border-radius: 25px;
        text-align: center;
        border: 4px solid #8b5a2b;
        box-shadow: 0 20px 50px rgba(60, 30, 10, 0.35);
        width: 420px;
      }

      h1 {
        color: #7a3e2d;
        margin-bottom: 10px;
      }

      .box {
        padding: 12px;
        border-radius: 12px;
        background: #fff0f5;
        border: 2px dashed #c48a45;
        font-size: 14px;
        min-height: 50px;
      }

      #mainBox {
        margin-top: 20px;
        padding: 20px;
        border-radius: 18px;
        background: #fff0f5;
        border: 2px dashed #c48a45;
        font-size: 20px;
        min-height: 120px;
        white-space: pre-line;
      }

      button {
        background: linear-gradient(145deg, #d291bc, #a0522d);
        color: white;
        border: 2px solid #7b4a2f;
        padding: 12px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- LEFT SIDE -->
      <div class="side">
        <button onclick="generateNickname()">🤍 Nickname</button>
        <div id="nicknameBox" class="box">nickname appears here</div>

        <button onclick="generateAmazingThing()">🌸 Amazing</button>
        <div id="amazingBox" class="box">amazing thing appears here</div>
      </div>

      <!-- CENTER -->
      <div class="card">
        <h1>Juliet Chevelle</h1>

        <div id="mainBox">
Click a button 🤍
        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="side">
        <button onclick="generateHaiku()">🐎 Haiku</button>
        <button onclick="generateFunnyPoem()">🤠 Funny Poem</button>
      </div>

    </div>

    <script>
      let currentNickname = "";
      let currentAmazingThing = "";

      function generateNickname() {
        const list = [
          "Squishy",
          "Wildflower",
          "Princess",
          "Honey Boots",
          "Daisy Belle",
          "Cowgirl Sunshine"
        ];
        currentNickname = list[Math.floor(Math.random() * list.length)];
        document.getElementById("nicknameBox").innerText = currentNickname;
      }

      function generateAmazingThing() {
        const list = [
          "amazing cook",
          "intentional friend",
          "smokin hot",
          "deep thinker",
          "deep lover",
          "compassionate",
          "great dance partner",
          "great companion",
          "hilarious"
        ];
        currentAmazingThing = list[Math.floor(Math.random() * list.length)];
        document.getElementById("amazingBox").innerText = currentAmazingThing;
      }

      function generateHaiku() {
        if (!currentNickname) generateNickname();
        if (!currentAmazingThing) generateAmazingThing();

        const text =
          currentNickname + "\n" +
          "soft light on the plains\n" +
          "she is a " + currentAmazingThing;

        document.getElementById("mainBox").innerText = text;
      }

      function generateFunnyPoem() {
  if (!currentNickname) generateNickname();
  if (!currentAmazingThing) generateAmazingThing();

  const poems = [
    currentNickname + "\nforgot her boots again\nshe is a " + currentAmazingThing + "\nstill runs the whole town",

    currentNickname + "\nspilled coffee on her jeans\nshe is a " + currentAmazingThing + "\nand somehow looks iconic",

    currentNickname + "\nsaid just one more dance\nshe is a " + currentAmazingThing + "\nnow the barn is cheering",

    currentNickname + "\nlaughed way too loud\nshe is a " + currentAmazingThing + "\nand no one complained",

    currentNickname + "\nshowed up late again\nshe is a " + currentAmazingThing + "\nand still stole the moment",

    currentNickname + "\ntripped but made it cute\nshe is a " + currentAmazingThing + "\nand turned it into style",

    currentNickname + "\nforgot what she was saying\nshe is a " + currentAmazingThing + "\nbut kept everyone smiling",

    currentNickname + "\ndanced like no one cared\nshe is a " + currentAmazingThing + "\nand everyone noticed",

    currentNickname + "\nwore boots and sparkle\nshe is a " + currentAmazingThing + "\nand owns the whole vibe",

    currentNickname + "\nran straight into chaos\nshe is a " + currentAmazingThing + "\nand somehow thrived",

    currentNickname + "\ndropped her phone again\nshe is a " + currentAmazingThing + "\nand still stays glowing",

    currentNickname + "\nstarted laughing first\nshe is a " + currentAmazingThing + "\nand no one recovered",

    currentNickname + "\nbrought snacks and drama\nshe is a " + currentAmazingThing + "\nand it worked out perfectly",

    currentNickname + "\nmissed the first step\nshe is a " + currentAmazingThing + "\nand led the dance anyway",

    currentNickname + "\nlooked way too good\nshe is a " + currentAmazingThing + "\nand caused a small scene"
  ];

  const randomIndex = Math.floor(Math.random() * poems.length);

  document.getElementById("mainBox").innerText = poems[randomIndex];
}
    </script>
  </body>
</html>
