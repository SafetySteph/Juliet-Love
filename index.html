<!DOCTYPE html>
<html>
  <head>
    <title>Juliet Chevelle Generator</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
        background:
          url('https://www.transparenttextures.com/patterns/flowers.png'),
          linear-gradient(135deg, #f7d6e0, #f3e5c8, #c48a45);
      }

      .container {
        display: flex;
        align-items: center;
        gap: 40px;
      }

      .side {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 200px;
      }

      .card {
        background: rgba(255, 250, 245, 0.95);
        padding: 35px;
        border-radius: 25px;
        text-align: center;
        border: 4px solid #8b5a2b;
        box-shadow: 0 20px 50px rgba(60, 30, 10, 0.35);
        width: 400px;
      }

      h1 {
        color: #7a3e2d;
        margin-bottom: 10px;
      }

      .box {
        padding: 12px;
        border-radius: 12px;
        background: #fff0f5;
        border: 2px dashed #c48a45;
        font-size: 14px;
        min-height: 50px;
        color: #4a2814;
      }

      #mainBox {
        margin-top: 20px;
        padding: 20px;
        border-radius: 18px;
        background: #fff0f5;
        border: 2px dashed #c48a45;
        font-size: 20px;
        min-height: 120px;
        white-space: pre-line;
        color: #4a2814;
      }

      button {
        background: linear-gradient(145deg, #d291bc, #a0522d);
        color: white;
        border: 2px solid #7b4a2f;
        padding: 12px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <div class="container">

      <div class="side">
        <button onclick="generateNickname()">🤍 Nickname</button>
        <div id="nicknameBox" class="box">nickname appears here</div>
      </div>

      <div class="card">
        <h1>Juliet Chevelle</h1>

        <div id="mainBox">
Click to generate something ✨
        </div>
      </div>

      <div class="side">
        <button onclick="generateHaiku()">🐎 Haiku</button>
      </div>

    </div>

    <script>
      let currentNickname = "";

      function generateNickname() {
        const list = [
          "Squishy",
          "Wildflower",
          "Princess",
          "Honey Boots",
          "Daisy Belle",
          "Cowgirl Sunshine"
        ];

        currentNickname = list[Math.floor(Math.random() * list.length)];

        document.getElementById("nicknameBox").innerText = currentNickname;
      }

      function generateHaiku() {
        if (!currentNickname) generateNickname();

        const haikus = [
          currentNickname + "\nsoft light on the plains\nsweet as morning air",
          currentNickname + "\nquiet like sunset skies\nwarm and steady glow",
          currentNickname + "\nwild heart in the wind\nsoft strength you can feel",
          currentNickname + "\ngolden hour glow\nbeauty in simple things",
          currentNickname + "\nlike fields in the breeze\nsoft laughter carries far",
          currentNickname + "\nboots in open dust\nkindness follows her steps"
        ];

        const randomIndex = Math.floor(Math.random() * haikus.length);

        document.getElementById("mainBox").innerText = haikus[randomIndex];
      }
    </script>
  </body>
</html>
