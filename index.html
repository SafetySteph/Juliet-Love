<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>For Juliet</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, serif;
      background:
        linear-gradient(rgba(255, 248, 238, 0.75), rgba(255, 248, 238, 0.75)),
        url("https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #3f2f24;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 250, 240, 0.93);
      border: 8px solid #3f2f24;
      border-radius: 42px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    .bar {
      width: 120px;
      height: 6px;
      background: #3f2f24;
      border-radius: 20px;
      margin: 0 auto 22px;
    }

    h1 {
      text-align: center;
      margin: 0;
      color: #6f4e37;
      font-size: 2.2rem;
    }

    .subtitle {
      text-align: center;
      margin: 10px 0 20px;
      color: #70594a;
      line-height: 1.5;
    }

    .flowers {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 18px;
    }

    .box {
      background: rgba(255, 255, 255, 0.82);
      border: 2px solid #e4c7aa;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 15px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(63, 47, 36, 0.12);
    }

    .box h2 {
      margin: 0 0 12px;
      color: #6f4e37;
      font-size: 1.2rem;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 20px;
      padding: 12px;
      background: linear-gradient(135deg, #a86f4c, #6f8f72);
      color: white;
      font-weight: bold;
      font-family: Georgia, serif;
      font-size: 0.98rem;
      cursor: pointer;
    }

    .output {
      margin-top: 12px;
      min-height: 70px;
      background: #fff3df;
      border-radius: 18px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: pre-line;
      line-height: 1.5;
      font-size: 0.98rem;
    }
  </style>
</head>

<body>
  <div class="phone">
    <div class="bar"></div>

    <h1>For Juliet</h1>
    <p class="subtitle">A little wildflower corner of the internet made just for her.</p>

    <div class="flowers">🌼 🌿 🌸 🌾 🌻</div>

    <div class="box">
      <h2>Nicknames</h2>
      <button onclick="generateNickname()">Generate Nickname</button>
      <div class="output" id="nicknameBox">Tap for a cute nickname.</div>
    </div>

    <div class="box">
      <h2>Something Amazing</h2>
      <button onclick="generateAmazing()">Generate Something Amazing</button>
      <div class="output" id="amazingBox">Tap for something amazing about Juliet.</div>
    </div>

    <div class="box">
      <h2>Haiku</h2>
      <button onclick="generateHaiku()">Generate Haiku</button>
      <div class="output" id="haikuBox">Tap for a tiny poem.</div>
    </div>

    <div class="box">
      <h2>Scripture</h2>
      <button onclick="generateScripture()">Generate Scripture</button>
      <div class="output" id="scriptureBox">Tap for a scripture.</div>
    </div>
  </div>

  <script>
    const nicknames = [
      "Squishy",
      "Princess",
      "Squishy Princess",
      "Princess Juliet",
      "Princess Jules",
      "Wildflower Princess",
      "Jules",
      "Juliet Rose",
      "Honey Bloom",
      "Sunshine Girl",
      "Little Meadow",
      "Daisy Heart",
      "Golden Girl",
      "Sweet Juliet",
      "Bloom Baby",
      "Tiny Miracle",
      "Moonlit Juliet",
      "Starlight",
      "Flower Crown Queen",
      "Lovely Jules"
    ];

    const amazingThings = [
      "Juliet is loyal in a way that feels rare, like someone who knows how to stay when it matters.",
      "Juliet is intelligent, not just because she knows things, but because she sees beneath the surface.",
      "Juliet is funny in the kind of way that makes ordinary moments feel alive.",
      "Juliet is talented, and her gifts feel natural, like flowers knowing how to bloom.",
      "Juliet carries wisdom with softness, which is one of the most beautiful combinations a person can have.",
      "Juliet is adventurous, the kind of person who makes life feel bigger just by being in it.",
      "Juliet is family-oriented, and that says so much about the depth of her heart.",
      "Juliet is an amazing friend because she brings warmth, loyalty, and laughter into the room.",
      "Juliet has princess energy, but not in a distant way. More like grace, beauty, and a little bit of magic.",
      "Juliet is radiant, loyal, funny, wise, and wildly loved."
    ];

    const haikus = [
      "Wildflowers lean close\nJuliet laughs with the sun\nLove blooms where she walks",
      "Morning light finds her\nGrace moves softly through her soul\nHeaven smiles gently",
      "Soft petals awake\nHer laughter waters the earth\nJoy follows her steps",
      "The meadow whispers\nHer heart teaches spring to sing\nGod calls her beloved",
      "Golden sunlight bends\nJuliet carries wonder\nLight stays in her hands"
    ];

    const scriptures = [
      "Proverbs 31:25\nShe is clothed with strength and dignity; she can laugh at the days to come.",
      "Psalm 139:14\nI praise you because I am fearfully and wonderfully made.",
      "Zephaniah 3:17\nThe Lord your God is with you. He will take great delight in you.",
      "Psalm 46:5\nGod is within her, she will not fall.",
      "Numbers 6:24-26\nThe Lord bless you and keep you; the Lord make His face shine on you and be gracious to you.",
      "Isaiah 43:4\nYou are precious and honored in My sight, and I love you."
    ];

    function randomFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function generateNickname() {
      document.getElementById("nicknameBox").textContent = randomFrom(nicknames);
    }

    function generateAmazing() {
      document.getElementById("amazingBox").textContent = randomFrom(amazingThings);
    }

    function generateHaiku() {
      document.getElementById("haikuBox").textContent = randomFrom(haikus);
    }

    function generateScripture() {
      document.getElementById("scriptureBox").textContent = randomFrom(scriptures);
    }
  </script>
</body>
</html>
