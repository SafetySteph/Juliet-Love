<!DOCTYPE html>
<html>
  <head>
    <title>Princess Juliet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, serif;

        background:
          linear-gradient(rgba(255, 245, 235, 0.6), rgba(255, 245, 235, 0.6)),
          url("https://images.unsplash.com/photo-1490750967868-88aa4486c946");

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        color: #4a2814;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: 1fr 1.4fr 1fr;
        gap: 24px;
        align-items: center;
      }

      .panel {
        background: rgba(255, 250, 245, 0.92);
        border: 3px solid #9b6337;
        border-radius: 28px;
        padding: 24px;
        text-align: center;
        box-shadow: 0 18px 45px rgba(70, 35, 15, 0.28);
      }

      h1 {
        margin: 0 0 8px;
        color: #7a3e2d;
        font-size: 32px;
      }

      h2 {
        margin: 0 0 14px;
        color: #7a3e2d;
        font-size: 22px;
      }

      p {
        margin: 0 0 20px;
        color: #9b6337;
        font-size: 15px;
      }

      button {
        background: linear-gradient(145deg, #d99abf, #a45a2a);
        color: white;
        border: 2px solid #7b4a2f;
        padding: 14px 18px;
        border-radius: 999px;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        box-shadow: 0 5px 0 #7b4a2f;
        margin-bottom: 18px;
      }

      button:active {
        transform: translateY(3px);
        box-shadow: 0 2px 0 #7b4a2f;
      }

      .box {
        background: #fff0f5;
        border: 2px dashed #c48a45;
        border-radius: 20px;
        padding: 20px;
        min-height: 100px;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        white-space: pre-line;
        line-height: 1.6;
      }

      .middle .box {
        min-height: 220px;
        font-size: 22px;
        background: linear-gradient(180deg, #fffaf5, #fff0f5);
      }

      .emoji {
        font-size: 30px;
        margin-bottom: 10px;
      }

      @media (max-width: 850px) {
        .container {
          grid-template-columns: 1fr;
        }

        .middle {
          order: -1;
        }

        h1 {
          font-size: 28px;
        }

        .middle .box {
          font-size: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- LEFT -->
      <div class="panel">
        <div class="emoji">🤍🌸</div>
        <h2>Nickname</h2>
        <button onclick="generateNickname()">Generate Nickname</button>
        <div id="nicknameBox" class="box">nickname appears here</div>
      </div>

      <!-- CENTER -->
      <div class="panel middle">
        <div class="emoji">🌾🐎🌸</div>
        <h1>Juliet Chevelle</h1>
        <p>A deep ranch haiku generator</p>
        <button onclick="generateHaiku()">Generate Haiku</button>
        <div id="haikuBox" class="box">haiku appears here</div>
      </div>

      <!-- RIGHT -->
      <div class="panel">
        <div class="emoji">✨🤠</div>
        <h2>Amazing Things</h2>
        <button onclick="generateAmazingThing()">Generate Amazing Thing</button>
        <div id="amazingBox" class="box">amazing thing appears here</div>
      </div>

    </div>

    <script>
      let currentNickname = "";
      let currentAmazingThing = "";

      function pick(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function generateNickname() {
        const softWords = [
          "Golden", "Velvet", "Wild", "Honey", "Rose", "Moonlit", "Prairie",
          "Daisy", "Bluebonnet", "Sugar", "Starlit", "Sunset", "Pearl",
          "Dreamy", "Sweet", "Brave", "Radiant", "Gentle", "Darling"
        ];

        const ranchWords = [
          "Cowgirl", "Wildflower", "Boots", "Belle", "Angel", "Princess",
          "Rider", "Rose", "Darlin", "Meadow", "Dove", "Heart", "Muse",
          "Trail Queen", "Prairie Pearl", "Sunshine"
        ];

        currentNickname = pick(softWords) + " " + pick(ranchWords);
        document.getElementById("nicknameBox").innerText = currentNickname;
      }

      function generateAmazingThing() {
        const openings = [
          "loyal in ways that feel rare",
          "intelligent with a beautifully curious mind",
          "funny in a way that makes moments unforgettable",
          "talented without needing attention",
          "wise beyond the obvious answer",
          "smokin' hot with effortless confidence",
          "adventurous with an open heart",
          "family oriented in the sweetest way",
          "an amazing friend who truly shows up",
          "a princess with strength beneath softness"
        ];

        const endings = [
          "and she makes people feel known",
          "while carrying beauty with humility",
          "and she brings light into every room",
          "with a spirit that refuses to be ordinary",
          "and her presence feels like peace",
          "while still being completely hilarious",
          "and she turns simple moments into memories",
          "with a heart that gives freely",
          "and she holds both softness and strength",
          "while making life feel more alive"
        ];

        currentAmazingThing = pick(openings) + ", " + pick(endings);
        document.getElementById("amazingBox").innerText = currentAmazingThing;
      }

      function generateHaiku() {
        if (!currentNickname) generateNickname();
        if (!currentAmazingThing) generateAmazingThing();

        const lineTwo = [
          "wisdom blooms in dust",
          "truth walks through open fields",
          "grace thinks before it speaks",
          "stars study her silence",
          "beauty asks deeper things",
          "wonder bends toward her",
          "soft strength names the dawn",
          "light gathers in her"
        ];

        const lineThree = [
          "she is " + currentAmazingThing,
          "love made visible",
          "depth wrapped in laughter",
          "a soul built to bloom",
          "truth wearing softness",
          "joy with deep roots",
          "wonder made human"
        ];

        const haiku =
          currentNickname + "\n" +
          pick(lineTwo) + "\n" +
          pick(lineThree);

        document.getElementById("haikuBox").innerText = haiku;
      }
    </script>
  </body>
</html>
